<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIOKU™ — Private Beta</title>
  <meta name="description" content="KIOKU is currently in closed beta. Access by invitation only." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0a0f1e;
      --navy2:   #0d1529;
      --gold:    #D4AF37;
      --gold2:   #c9a227;
      --text:    #e8eaf0;
      --muted:   #7a8499;
      --border:  rgba(212,175,55,0.18);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy2) 50%, #0b1220 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(13, 21, 41, 0.6);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.35em;
      color: var(--gold);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.15;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      margin-bottom: 24px;
    }

    p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
      margin-bottom: 28px;
    }

    p.footnote {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      opacity: 0.55;
      margin-top: 40px;
      margin-bottom: 0;
      letter-spacing: 0.04em;
    }

    a.email {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    a.email:hover { border-color: var(--gold); }

    a.signin {
      display: inline-block;
      margin-top: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    a.signin:hover { color: var(--gold); border-color: var(--gold); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">KIOKU™ · IKONBAI™</div>
    <span class="badge">Private Beta</span>
    <h1>Access is invitation-only</h1>
    <p>
      KIOKU is a multi-agent memory and deliberation platform currently in a closed private beta.
      For access inquiries, email
      <a class="email" href="mailto:kote@ikonbai.com">kote@ikonbai.com</a>.
    </p>
    <a class="signin" href="/app">Sign in</a>
    <p class="footnote">© 2026 IKONBAI™, Inc. — Patent Pending</p>
  </div>
</body>
</html>
