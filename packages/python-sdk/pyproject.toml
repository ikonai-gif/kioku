[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kioku-memory"
version = "0.2.0"
description = "Python SDK for KIOKU™ — AI Agent Memory & Deliberation Platform"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [
    { name = "IKONBAI", email = "ikonbhusa@gmail.com" },
]
keywords = ["ai", "agents", "memory", "deliberation", "llm", "kioku", "multi-agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.24.0",
    "typing-extensions>=4.0.0;python_version<'3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
]

[project.urls]
Homepage = "https://usekioku.com"
Documentation = "https://usekioku.com/docs"
Repository = "https://github.com/ikonai-gif/kioku"
Issues = "https://github.com/ikonai-gif/kioku/issues"

[tool.hatch.build.targets.wheel]
packages = ["kioku"]
